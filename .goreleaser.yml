version: 2

project_name: sideshow

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: sideshow
    main: ./cmd/sideshow
    binary: sideshow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.channel=stable
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: arcavenae
    name: sideshow
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## sideshow v{{.Version}}

    Content pack manager for AI CLI tools.
  footer: |
    **Full Changelog**: https://github.com/arcavenae/sideshow/compare/{{ .PreviousTag }}...{{ .Tag }}

    ### Installation

    ```bash
    brew install arcavenae/tap/sideshow
    ```

brews:
  - repository:
      owner: arcavenae
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): update sideshow to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/arcavenae/sideshow"
    description: "Content pack manager for AI CLI tools"
    license: "MIT"
    install: |
      bin.install "sideshow"
    test: |
      assert_match version.to_s, shell_output("#{bin}/sideshow version 2>&1")
